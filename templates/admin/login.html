<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityLink Admin - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .admin-gradient {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        
        /* Subtle grid pattern overlay */
        .grid-bg {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="admin-gradient min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background decoration -->
    <div class="absolute inset-0 grid-bg pointer-events-none"></div>
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-500 via-orange-500 to-yellow-500"></div>

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl relative z-10 p-8">
        
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gray-800 rounded-full mb-4 border border-gray-700 shadow-inner">
                <i data-lucide="shield-lock" class="w-8 h-8 text-yellow-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Restricted Access</h1>
            <p class="text-gray-500 text-sm mt-2">CityLink Administrative Control Panel</p>
        </div>

        <!-- Form -->
        <form id="admin-login-form" class="space-y-6">
            
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Admin ID</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="h-5 w-5 text-gray-500"></i>
                    </div>
                    <input type="text" id="admin-id" 
                           class="block w-full pl-10 pr-3 py-3 bg-gray-950 border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-colors" 
                           placeholder="Enter ID" required>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="h-5 w-5 text-gray-500"></i>
                    </div>
                    <input type="password" id="admin-pass" 
                           class="block w-full pl-10 pr-3 py-3 bg-gray-950 border border-gray-700 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-500/50 focus:border-yellow-500 transition-colors" 
                           placeholder="••••••••" required>
                </div>
            </div>

            <div id="error-msg" class="hidden p-3 bg-red-900/20 border border-red-900/50 rounded-lg flex items-center gap-2 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                <span>Invalid credentials. Access denied.</span>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-black bg-yellow-500 hover:bg-yellow-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-yellow-500 transition-colors">
                <i data-lucide="key" class="w-4 h-4 mr-2"></i> Authenticate
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <a href="/" class="text-xs text-gray-500 hover:text-white transition-colors flex items-center justify-center gap-1">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Public Site
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const idInput = document.getElementById('admin-id');
            const passInput = document.getElementById('admin-pass');
            const errorMsg = document.getElementById('error-msg');
            const btn = this.querySelector('button');
            const originalBtnText = btn.innerHTML;

            // UI Loading State
            btn.innerText = 'Verifying...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                // 1. Call the Backend API (app.py)
                // This sends the password you typed to Python for checking against 'admin@123'
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: idInput.value.trim(), 
                        password: passInput.value 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 2. Login Successful: Save session and redirect
                    localStorage.setItem('citylinkAdmin', JSON.stringify(data.session));
                    window.location.href = '/admin/dashboard';
                } else {
                    // 3. Login Failed
                    throw new Error(data.error || "Login Failed");
                }

            } catch (err) {
                console.error(err);
                errorMsg.classList.remove('hidden');
                errorMsg.querySelector('span').textContent = "Incorrect Admin ID or Password.";
                passInput.value = ''; // Clear password for retry
            } finally {
                // Reset Button
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
                lucide.createIcons(); // Re-render icons if needed
            }
        });
    </script>
</body>
</html>
