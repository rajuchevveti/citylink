{% extends "admin/admin_base.html" %}

{% block title %}User Management{% endblock %}
{% block header_title %}Provider & User Registry{% endblock %}

{% block content %}

    <!-- Header Actions -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-lg font-bold text-white">Service Providers</h2>
            <p class="text-gray-400 text-sm">Monitor and verify business accounts.</p>
        </div>
        <div class="flex gap-3">
            <input type="text" id="search-users" placeholder="Search providers..." class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-500 outline-none">
            <button class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-4 rounded-lg text-sm transition">
                <i data-lucide="user-plus" class="w-4 h-4 inline mr-1"></i> Add Manual
            </button>
        </div>
    </div>

    <!-- Providers Table -->
    <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-gray-400">
                <thead class="bg-gray-900/50 text-xs uppercase font-bold text-gray-500">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Business Name</th>
                        <th class="px-6 py-4">Category</th>
                        <th class="px-6 py-4">Reputation</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="providers-table-body" class="divide-y divide-gray-700">
                    <!-- JS will inject rows here -->
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center">
                            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-600 border-t-yellow-500"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='admin/js/admin_users.js') }}"></script>

{% endblock %}
