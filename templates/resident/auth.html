<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CityLink - Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 h-screen w-full flex items-center justify-center p-2 sm:p-4 overflow-hidden">

    <div class="bg-white w-full max-w-4xl h-[90vh] md:h-[650px] rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <!-- LEFT PANEL -->
        <div class="hidden md:flex w-5/12 bg-slate-900 relative flex-col justify-between p-8 overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="{{ url_for('static', filename='shared/img/auth.png') }}" 
                     class="w-full h-full object-cover opacity-60"
                     onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800&auto=format&fit=crop'">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-900/80 via-slate-900/40 to-slate-900/90"></div>
            </div>
            <div class="relative z-10 flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg"><i data-lucide="link" class="w-5 h-5 text-white"></i></div>
                <span class="text-xl font-bold text-white tracking-tight">City<span class="text-indigo-400">Link</span></span>
            </div>
            <div class="relative z-10 mt-auto">
                <h1 class="text-2xl font-extrabold text-white leading-tight mb-3">Connecting<br>Your City.</h1>
                <div class="flex gap-2 mt-2">
                    <div class="glass-panel px-3 py-1 rounded-lg text-white text-[10px] font-semibold flex items-center gap-1.5"><i data-lucide="shield-check" class="w-3 h-3 text-green-400"></i> Verified</div>
                    <div class="glass-panel px-3 py-1 rounded-lg text-white text-[10px] font-semibold flex items-center gap-1.5"><i data-lucide="users" class="w-3 h-3 text-blue-400"></i> 10k+</div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="right-panel" class="w-full md:w-7/12 bg-white flex flex-col p-6 sm:p-8 overflow-y-auto no-scrollbar relative h-full">
            <div class="md:hidden flex justify-center mb-4 text-indigo-600"><i data-lucide="link" class="w-8 h-8"></i></div>
            <div class="max-w-sm mx-auto w-full my-auto">
                <div class="text-center mb-5">
                    <h2 id="page-title" class="text-2xl font-bold text-gray-900">Create Account</h2>
                    <p id="page-subtitle" class="text-xs text-gray-500 mt-1">Join your community today.</p>
                </div>
                <div class="bg-gray-100 p-1 rounded-lg flex mb-5 relative shadow-inner" id="role-switcher">
                    <button type="button" id="resident-tab" onclick="switchAuthType('Resident')" class="flex-1 py-2 text-xs font-bold rounded-md shadow-sm bg-white text-gray-900 transition-all flex items-center justify-center gap-1.5"><i data-lucide="home" class="w-3.5 h-3.5"></i> Resident</button>
                    <button type="button" id="business-tab" onclick="switchAuthType('Business')" class="flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700 rounded-md transition-all flex items-center justify-center gap-1.5"><i data-lucide="briefcase" class="w-3.5 h-3.5"></i> Business</button>
                </div>
                <div id="status-message" class="hidden p-3 mb-4 rounded-lg text-xs font-medium text-center border"></div>

                <form id="registration-form" class="space-y-3 fade-in">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="user" class="w-4 h-4 text-gray-400"></i></div>
                        <input id="name-input-reg" type="text" placeholder="Full Name" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" required>
                    </div>
                    <div id="business-fields" class="space-y-3 hidden">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="tag" class="w-4 h-4 text-gray-400"></i></div>
                            <select id="business-type" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none text-gray-600">
                                <option value="" disabled selected>Service Category</option>
                                <option value="Plumbing">Plumbing</option>
                                <option value="Electrician">Electrician</option>
                                <option value="Restaurant">Restaurant</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Drone Repair">Drone Repair</option>
                            </select>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="map-pin" class="w-4 h-4 text-gray-400"></i></div>
                            <input id="business-location" type="text" placeholder="City" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="mail" class="w-4 h-4 text-gray-400"></i></div>
                        <input id="email-reg" type="email" placeholder="Email" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                         <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="phone" class="w-4 h-4 text-gray-400"></i></div>
                            <input id="phone-reg" type="tel" placeholder="Phone" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                        </div>
                         <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="lock" class="w-4 h-4 text-gray-400"></i></div>
                            <input id="password-reg" type="password" placeholder="Password" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                        </div>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="lock" class="w-4 h-4 text-gray-400"></i></div>
                        <input id="confirm-password" type="password" placeholder="Confirm Password" class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                    </div>
                    <div class="flex items-center pt-1">
                        <input id="terms-agree-reg" type="checkbox" class="w-3.5 h-3.5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" required>
                        <label for="terms-agree-reg" class="ml-2 text-xs text-gray-500">I agree to <a href="#" class="text-indigo-600 hover:underline">Terms & Privacy</a>.</label>
                    </div>
                    <button id="signup-button" type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-all transform active:scale-[0.98] text-sm">Sign Up</button>
                </form>

                <form id="login-form" class="space-y-4 hidden fade-in">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="mail" class="w-4 h-4 text-gray-400"></i></div>
                        <input id="email-login" type="email" placeholder="Email Address" class="w-full pl-9 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                    </div>
                    <div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="lock" class="w-4 h-4 text-gray-400"></i></div>
                            <input id="password-login" type="password" placeholder="Password" class="w-full pl-9 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:bg-white focus:ring-1 focus:ring-indigo-500 outline-none" required>
                        </div>
                        <div class="text-right mt-1.5"><a href="#" class="text-[10px] text-indigo-600 font-semibold hover:underline">Forgot Password?</a></div>
                    </div>
                    <button id="login-button" type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg shadow-md transition-all transform active:scale-[0.98] text-sm">Login</button>
                </form>

                <div class="mt-6 text-center border-t border-gray-100 pt-4">
                    <p class="text-xs text-gray-500" id="form-toggle-text">Have an account? <button id="toggle-auth-btn" class="text-indigo-600 font-bold hover:underline ml-1">Log In</button></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentAuthType = 'Resident'; let isLoginView = false;
        const els = { resTab: document.getElementById('resident-tab'), bizTab: document.getElementById('business-tab'), nameInp: document.getElementById('name-input-reg'), bizFields: document.getElementById('business-fields'), regForm: document.getElementById('registration-form'), logForm: document.getElementById('login-form'), statusMsg: document.getElementById('status-message'), toggleBtn: document.getElementById('toggle-auth-btn'), toggleTxt: document.getElementById('form-toggle-text'), title: document.getElementById('page-title'), subtitle: document.getElementById('page-subtitle'), panel: document.getElementById('right-panel') };

        function switchAuthType(type) {
            currentAuthType = type; const isRes = type === 'Resident';
            const activeStyle = "flex-1 py-2 text-xs font-bold rounded-md shadow-sm bg-white text-gray-900 transition-all flex items-center justify-center gap-1.5 ring-1 ring-black/5";
            const inactiveStyle = "flex-1 py-2 text-xs font-medium text-gray-500 hover:text-gray-700 rounded-md transition-all flex items-center justify-center gap-1.5 hover:bg-gray-50";
            els.resTab.className = isRes ? activeStyle : inactiveStyle; els.bizTab.className = !isRes ? activeStyle : inactiveStyle;
            els.nameInp.placeholder = isRes ? "Full Name" : "Business Name";
            if(!isRes) { els.bizFields.classList.remove('hidden'); els.panel.scrollTo({ top: 0, behavior: 'smooth' }); } else { els.bizFields.classList.add('hidden'); }
        }

        els.toggleBtn.addEventListener('click', (e) => {
            e.preventDefault(); isLoginView = !isLoginView;
            if (isLoginView) {
                els.regForm.classList.add('hidden'); els.logForm.classList.remove('hidden');
                els.title.innerText = "Welcome Back"; els.subtitle.innerText = "Access your dashboard.";
                els.toggleTxt.innerHTML = `No account? <button id="toggle-back" class="text-indigo-600 font-bold hover:underline ml-1">Sign Up</button>`;
            } else {
                els.logForm.classList.add('hidden'); els.regForm.classList.remove('hidden');
                els.title.innerText = "Create Account"; els.subtitle.innerText = "Join the community.";
                els.toggleTxt.innerHTML = `Have an account? <button id="toggle-back" class="text-indigo-600 font-bold hover:underline ml-1">Log In</button>`;
            }
            document.getElementById('toggle-back').addEventListener('click', () => els.toggleBtn.click());
            els.statusMsg.classList.add('hidden'); els.panel.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function displayStatus(msg, isError) {
            els.statusMsg.innerHTML = isError ? `<i data-lucide="alert-circle" class="w-4 h-4 inline mr-1"></i> ${msg}` : `<i data-lucide="check-circle-2" class="w-4 h-4 inline mr-1"></i> ${msg}`;
            els.statusMsg.className = isError ? "p-3 mb-4 rounded-lg text-xs font-medium text-center border border-red-100 bg-red-50 text-red-700 block" : "p-3 mb-4 rounded-lg text-xs font-medium text-center border border-green-100 bg-green-50 text-green-700 block";
            els.statusMsg.classList.remove('hidden'); lucide.createIcons(); els.panel.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generateSimpleId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        function getAllUsers() { try { return JSON.parse(localStorage.getItem('citylinkUsers')) || []; } catch(e) { return []; } }
        function saveAllUsers(u) { localStorage.setItem('citylinkUsers', JSON.stringify(u)); }
        
        function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('login-button');
            const originalText = btn.innerText; btn.innerText = "Verifying..."; btn.disabled = true;
            const email = document.getElementById('email-login').value.trim(); const pwd = document.getElementById('password-login').value;
            const users = getAllUsers(); const user = users.find(u => u.email === email && u.password === pwd);

            setTimeout(() => {
                if (user) {
                    if (user.type !== currentAuthType) { displayStatus(`Switch to <b>${user.type}</b> tab.`, true); btn.innerText = originalText; btn.disabled = false; return; }
                    localStorage.setItem('citylinkUser', JSON.stringify(user)); displayStatus("Success!", false);
                    setTimeout(() => window.location.href = user.type === 'Business' ? '/business/leads' : '/', 800);
                } else { displayStatus("Invalid credentials.", true); btn.innerText = originalText; btn.disabled = false; }
            }, 600);
        }

        async function handleReg(e) {
            e.preventDefault(); const btn = document.getElementById('signup-button');
            btn.innerText = "Creating..."; btn.disabled = true;
            const name = document.getElementById('name-input-reg').value; const email = document.getElementById('email-reg').value;
            const pwd = document.getElementById('password-reg').value; const confirm = document.getElementById('confirm-password').value;
            const phone = document.getElementById('phone-reg').value;
            
            if (pwd !== confirm) { displayStatus("Passwords mismatch", true); btn.disabled=false; btn.innerText="Sign Up"; return; }
            
            const newUser = { userId: generateSimpleId(), name, email, password: pwd, phone, type: currentAuthType };
            
            if (currentAuthType === 'Business') {
                const bType = document.getElementById('business-type').value;
                const bLoc = document.getElementById('business-location').value;
                if(!bType) { displayStatus("Select Category", true); btn.disabled=false; btn.innerText="Sign Up"; return; }
                
                try {
                    const res = await fetch('/api/auth/register-business', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ businessName: name, category: bType, city: bLoc }) });
                    const data = await res.json();
                    if(data.success) { newUser.businessType = bType; newUser.serviceId = data.service_id; }
                    else throw new Error();
                } catch(e) { displayStatus("Registration Error", true); btn.disabled=false; btn.innerText="Sign Up"; return; }
            }

            const users = getAllUsers(); users.push(newUser); saveAllUsers(users);
            localStorage.setItem('citylinkUser', JSON.stringify(newUser));
            displayStatus("Success!", false);
            setTimeout(() => window.location.href = newUser.type === 'Business' ? '/business/leads' : '/', 800);
        }

        els.logForm.addEventListener('submit', handleLogin); els.regForm.addEventListener('submit', handleReg);
    </script>
</body>
</html>
