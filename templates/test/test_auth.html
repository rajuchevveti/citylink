<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth Console</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Load custom test styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='test/test_styles.css') }}">
    <style>
        /* Custom Tailwind config for Inter font */
        html { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl bg-white p-8 rounded-xl shadow-2xl my-8">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-6 text-center">
            CityLink Authentication Test
        </h2>
        
        <!-- Account Type Tabs for Registration/Login -->
        <div class="flex border-b mb-6" id="tab-container">
            <button type="button" id="resident-tab" data-type="Resident" class="flex-1 py-3 text-sm font-semibold border-b-2 border-indigo-600 text-indigo-600 transition duration-150">
                Resident
            </button>
            <button type="button" id="business-tab" data-type="Business" class="flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition duration-150">
                Business
            </button>
        </div>

        <!-- Status Message Area -->
        <div id="status-message" class="hidden p-3 mb-4 rounded-lg font-semibold text-sm text-center"></div>

        <!-- Registration Form (Visible by Default) -->
        <form id="registration-form" class="space-y-4">
            <h3 class="text-xl font-bold text-gray-900">New Account Sign Up</h3>
            
            <div><input id="name-input-reg" type="text" placeholder="Full Name" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>

            <!-- Business-Specific Fields (Hidden by default) -->
            <div id="business-fields" class="space-y-4 hidden">
                <div>
                    <select id="business-type" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <option value="" disabled selected>Select Business Type</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrician">Electrician</option>
                    </select>
                </div>
                <div><input id="business-location" type="text" placeholder="City / Service Area" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div>
            </div>

            <div><input id="email-reg" type="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            <div><input id="password-reg" type="password" placeholder="Password (min 6 chars)" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            <div><input id="confirm-password" type="password" placeholder="Confirm Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            <div><input id="phone-reg" type="tel" placeholder="Phone Number" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            
            <div class="flex items-center pt-2">
                <input id="terms-agree-reg" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded" required>
                <label for="terms-agree-reg" class="ml-2 block text-sm text-gray-600 select-none">I agree to the Terms</label>
            </div>

            <button id="signup-button" type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg shadow-md transition duration-200 mt-4">
                Register New User
            </button>
        </form>
        
        <!-- Login Form (Hidden by Default) -->
        <form id="login-form" class="space-y-4 hidden">
            <h3 class="text-xl font-bold text-gray-900 pt-4">Existing User Log In</h3>
            <p class="text-sm text-gray-500 mb-4">Select role based on how you registered.</p>
            
            <!-- Login Role Tabs - Visible but styled differently -->
            <div class="flex space-x-4 mb-4">
                <button type="button" id="login-resident-tab" data-type="Resident" class="flex-1 py-2 text-sm font-semibold border-2 border-indigo-600 text-indigo-600 rounded-lg transition duration-150">
                    Resident
                </button>
                <button type="button" id="login-business-tab" data-type="Business" class="flex-1 py-2 text-sm font-semibold border-2 border-gray-300 text-gray-500 rounded-lg hover:border-indigo-600 hover:text-indigo-600 transition duration-150">
                    Business
                </button>
            </div>

            <div><input id="email-login" type="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            <div><input id="password-login" type="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
            
            <button id="login-button" type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg shadow-md transition duration-200 mt-4">
                Log In Securely
            </button>
        </form>

        <div class="text-center mt-6">
            <button id="toggle-view-link" class="text-indigo-600 hover:text-indigo-700 font-semibold text-sm">
                Already have an account? Log In
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='test/test_script.js') }}"></script>
</body>
</html>
